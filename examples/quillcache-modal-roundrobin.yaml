# Cache-blind baseline: same 2-engine Modal fleet, round-robin routing, no
# Conductor. Contrast against quillcache-modal.yaml (dynamo-cost + conductor) to
# show what cache-affine routing buys on a shared-prefix workload.
bind: 127.0.0.1:8080
policy: round-robin
conductor: false
engines:
  - id: modal-vllm-a
    kind: Vllm
    base_url: https://feichai0017--quillcache-vllm-serve.modal.run
    model_id: Qwen/Qwen2.5-0.5B-Instruct
    tokenizer_id: Qwen/Qwen2.5-0.5B-Instruct
    tenant_id: default
    locality_domain: modal
  - id: modal-vllm-b
    kind: Vllm
    base_url: https://feichai0017--quillcache-vllm-b-serve.modal.run
    model_id: Qwen/Qwen2.5-0.5B-Instruct
    tokenizer_id: Qwen/Qwen2.5-0.5B-Instruct
    tenant_id: default
    locality_domain: modal
