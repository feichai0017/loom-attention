# QuillCache runtime control-plane example:
# - prefill/decode engine roles
# - persistent Holt residency index
# - in-process tiered HBM/DRAM/SSD data plane
#
# Run:
#   cargo run --features holt -- gateway --config examples/quillcache-pd-tiered.yaml
bind: 127.0.0.1:8080
policy: slo-aware
index: holt
index_path: quillcache-residency
data_plane:
  kind: tiered
  hbm_capacity_bytes: 85899345920
  cpu_dram_capacity_bytes: 549755813888
  local_ssd_capacity_bytes: 1099511627776
action_sink:
  kind: http
  url: http://127.0.0.1:9090/v1/quillcache/actions
  fail_open: true
  timeout_ms: 250
engines:
  - id: prefill-a
    kind: Vllm
    role: Prefill
    base_url: http://127.0.0.1:8001
    model_id: Qwen/Qwen2.5-7B-Instruct
    tokenizer_id: Qwen/Qwen2.5-7B-Instruct
    tenant_id: default
    locality_domain: rack-a
  - id: decode-a
    kind: Vllm
    role: Decode
    base_url: http://127.0.0.1:8002
    model_id: Qwen/Qwen2.5-7B-Instruct
    tokenizer_id: Qwen/Qwen2.5-7B-Instruct
    tenant_id: default
    locality_domain: rack-a
  - id: decode-b
    kind: Vllm
    role: Decode
    base_url: http://127.0.0.1:8003
    model_id: Qwen/Qwen2.5-7B-Instruct
    tokenizer_id: Qwen/Qwen2.5-7B-Instruct
    tenant_id: default
    locality_domain: rack-b
